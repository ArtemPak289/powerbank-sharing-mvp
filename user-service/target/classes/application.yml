spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:54320/user_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: 8081

grpc:
  server:
    port: 9091

keycloak:
  server-url: http://localhost:8080
  realm: powerbank
  client-id: powerbank-app
  admin:
    username: admin
    password: admin
