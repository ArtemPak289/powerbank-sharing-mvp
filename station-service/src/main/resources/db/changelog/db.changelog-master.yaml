databaseChangeLog:
  - changeSet:
      id: 001-create-stations-table
      author: powerbank
      changes:
        - createTable:
            tableName: stations
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: double
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: double
                  constraints:
                    nullable: false
              - column:
                  name: total_slots
                  type: int
                  defaultValueNumeric: 6
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 002-create-power-banks-table
      author: powerbank
      changes:
        - createTable:
            tableName: power_banks
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: station_id
                  type: uuid
                  constraints:
                    nullable: true
              - column:
                  name: slot_number
                  type: int
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: AVAILABLE
                  remarks: "AVAILABLE, LOCKED, RENTED"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: power_banks
            baseColumnNames: station_id
            referencedTableName: stations
            referencedColumnNames: id
            constraintName: fk_power_banks_station
        - createIndex:
            indexName: idx_power_banks_station_id
            tableName: power_banks
            columns:
              - column:
                  name: station_id

  - changeSet:
      id: 003-seed-stations
      author: powerbank
      comment: "Seed test data: 3 stations with 6 powerbanks each"
      changes:
