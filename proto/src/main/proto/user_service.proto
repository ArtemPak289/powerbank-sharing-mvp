syntax = "proto3";

package powerbank;

option java_multiple_files = true;
option java_package = "com.powerbank.proto.user";

// ============================================================================
//  User Service — gRPC API
// ============================================================================

service UserService {
  rpc GetUserByExternalId (GetUserByExternalIdRequest) returns (UserResponse);
}

message GetUserByExternalIdRequest {
  string external_id = 1;
}

message UserResponse {
  string id = 1;
  string phone = 2;
  string external_id = 3;
}
