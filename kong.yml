_format_version: "3.0"
services:
  - name: auth-service
    url: grpc://host.docker.internal:9091
    routes:
      - name: auth-routes
        paths:
          - /
        protocols:
          - http
          - https
    plugins:
      - name: grpc-gateway
        config:
          proto: /opt/kong/protos/auth_service.proto

  - name: station-service
    url: grpc://host.docker.internal:9093
    routes:
      - name: station-routes
        paths:
          - /v1/stations
        protocols:
          - http
          - https
    plugins:
      - name: grpc-gateway
        config:
          proto: /opt/kong/protos/station_service.proto
      - name: jwt
        config:
          claims_to_verify:
            - exp

  - name: rental-service
    url: grpc://host.docker.internal:9094
    routes:
      - name: rental-routes
        paths:
          - /v1/rental
          - /v1/cards
        protocols:
          - http
          - https
    plugins:
      - name: grpc-gateway
        config:
          proto: /opt/kong/protos/rental_service.proto
      - name: jwt
        config:
          claims_to_verify:
            - exp

consumers:
  - username: powerbank-user

jwt_secrets:
  - consumer: powerbank-user
    key: http://localhost:8080/realms/powerbank
    algorithm: RS256
    rsa_public_key: |
      -----BEGIN PUBLIC KEY-----
      
      -----END PUBLIC KEY-----
